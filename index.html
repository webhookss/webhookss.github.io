<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Request</title>
    <style>
        :root {
            --primary: #5865F2;
            --primary-hover: #4752C4;
            --bg: #f4f4f5;
            --text: #2e3338;
            --border: #e3e5e8;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px 20px; 
            text-align: center; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        
        }

        .links { 
            margin-bottom: 30px; 
            font-size: 14px;
        }

        .links a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .fwrp-btn { 
            background: #23272a; 
            color: #fff !important; 
            padding: 6px 12px; 
            border-radius: 4px; 
            font-size: 12px; 
            display: inline-block;
            margin-top: 10px;
        }

        .box { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%;
            max-width: 400px; 
            background: #fff; 
            padding: 30px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: left; 
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            color: #4f5660;
            text-transform: uppercase;
        }

        input, textarea { 
            padding: 10px; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-family: inherit; 
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button#submit-btn { 
            padding: 12px; 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button#submit-btn:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        button:disabled { 
            opacity: 0.6; 
            cursor: not-allowed;
        }

        .presets { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            margin-top: 5px; 
            background: #f8f9fa;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .presets strong {
            font-size: 13px;
            color: #4f5660;
        }

        .p-btn { 
            font-size: 12px; 
            padding: 8px; 
            background: #fff; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            border-radius: 4px; 
            text-align: left; 
            transition: background 0.2s;
        }

        .p-btn:hover { 
            background: #e3e5e8; 
        }
    </style>
</head>
<body>

    <div class="links">
        <span>Join the Discord server where messages get received: </span>
        <a href="https://discord.gg/qwcBsw8s6P" target="_blank">discord.gg/qwcBsw8s6P</a>
        <br>
        <a href="https://discord.com/terms" target="_blank" class="fwrp-btn">Please ensure your messages follow Discord TOS</a>
    </div>

    <form class="box" id="webhook-form">
        <div class="input-group">
            <label for="username">Username (Prefer User ID)</label>
            <input type="text" id="username" placeholder="Your name or ID" required>
        </div>
        
        <div class="input-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Subject" required>
        </div>
        
        <div class="input-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Message content..." rows="5" required></textarea>
        </div>

        <div class="presets">
            <strong>Presets:</strong>
            <button type="button" class="p-btn" data-msg="Dear neighbor, I noticed a slight issue with your property. Could we discuss this calmly?">Neighbor: Calm</button>
            <button type="button" class="p-btn" data-msg="LISTEN NEIGHBOR, FIX YOUR STUFF OR THERE WILL BE CONSEQUENCES. I AM NOT ASKING AGAIN.">Neighbor: Aggressive</button>
            <button type="button" class="p-btn" data-msg="OFFICIAL NOTICE: This is a formal letter regarding your plumbing. Be advised that we are sending a team to destroy your pipes immediately.">Official: Destroy Pipes</button>
        </div>

        <button type="submit" id="submit-btn">Send</button>
    </form>

    <script>
        const form = document.getElementById('webhook-form');
        const btn = document.getElementById('submit-btn');
        const descInput = document.getElementById('description');
        const presetBtns = document.querySelectorAll('.p-btn');
        
        const url = "https://discord-proxy.stelies2020.workers.dev";

        // Handle Presets via data attributes
        presetBtns.forEach(button => {
            button.addEventListener('click', () => {
                descInput.value = button.getAttribute('data-msg');
            });
        });

        // Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevents the page from refreshing on submit

            const data = {
                username: document.getElementById('username').value.trim(),
                title: document.getElementById('title').value.trim(),
                description: descInput.value.trim()
            };

            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    form.reset(); // Clear all inputs
                    btn.innerText = "Sent Successfully!";
                } else {
                    btn.innerText = "Failed to Send";
                }
            } catch (error) {
                btn.innerText = "Error Occurred";
            } finally {
                setTimeout(() => { 
                    btn.disabled = false; 
                    btn.innerText = "Send"; 
                }, 2500);
            }
        });
    </script>
</body>
</html>
