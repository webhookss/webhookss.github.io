<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit</title>
    <style>
        :root {
            --brand: #5865F2;
            --brand-hover: #4752C4;
            --bg-base: #202225;
            --bg-panel: #36393f;
            --bg-input: #40444b;
            --text-normal: #dcddde;
            --text-muted: #72767d;
            --text-header: #ffffff;
            --danger: #ed4245;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-normal); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header-links { 
            margin-bottom: 30px; 
            text-align: center;
            background: var(--bg-panel);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-links span {
            font-size: 15px;
            color: var(--text-header);
        }

        .header-links a.discord-link { 
            color: var(--brand); 
            text-decoration: none; 
            font-weight: bold; 
            transition: color 0.2s;
        }

        .header-links a.discord-link:hover {
            text-decoration: underline;
            color: var(--brand-hover);
        }

        .fwrp-btn { 
            display: inline-block;
            background: #23272a; 
            color: var(--text-muted); 
            padding: 8px 12px; 
            border-radius: 4px; 
            font-size: 12px; 
            margin-top: 15px;
            text-decoration: none;
            border: 1px solid #23272a;
            transition: all 0.2s;
        }

        .fwrp-btn:hover {
            color: var(--text-normal);
            border-color: var(--text-muted);
        }

        .box { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            width: 100%;
            max-width: 480px; 
            background: var(--bg-panel); 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            color: #8e9297;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea { 
            padding: 12px; 
            background-color: var(--bg-input);
            color: var(--text-normal);
            border: 1px solid transparent; 
            border-radius: 4px; 
            font-family: inherit; 
            font-size: 15px;
            transition: border-color 0.2s;
            resize: vertical;
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--brand);
        }

        .presents-section {
            background: #2f3136;
            padding: 15px;
            border-radius: 6px;
        }

        .presents-section strong {
            display: block;
            margin-bottom: 10px;
            color: var(--text-header);
            font-size: 14px;
        }

        .presets { 
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 8px; 
        }

        .p-btn { 
            font-size: 12px; 
            padding: 8px; 
            background: var(--bg-input); 
            color: var(--text-normal);
            border: 1px solid transparent; 
            cursor: pointer; 
            border-radius: 4px; 
            text-align: center; 
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .p-btn:hover { 
            background: #4f545c; 
        }

        button#submit-btn { 
            padding: 14px; 
            background: var(--brand); 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
        }

        button#submit-btn:hover:not(:disabled) {
            background: var(--brand-hover);
        }

        button#submit-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled { 
            opacity: 0.5; 
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="header-links">
        <span>Join discord server where shit gets recieved: </span>
        <a href="https://discord.gg/qwcBsw8s6P" target="_blank" class="discord-link">.gg/qwcBsw8s6P</a>
        <br>
        <a href="https://discord.com/terms" target="_blank" class="fwrp-btn">Please send your messages to be under the discord TOS</a>
    </div>

    <form class="box" id="webhook-form">
        <div class="input-group">
            <label for="username">Username (preffer user id)</label>
            <input type="text" id="username" placeholder="Your name/id" required>
        </div>
        
        <div class="input-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Subject" required>
        </div>
        
        <div class="input-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Message content... (vibecoded the remake because ihy)" rows="4" required></textarea>
        </div>

        <div class="presents-section">
            <strong>Presents:</strong>
            <div class="presets">
                <button type="button" class="p-btn" data-msg="Dear neighbor, I noticed a slight issue with your property. Could we discuss this calmly?">Neighbor: Calm</button>
                <button type="button" class="p-btn" data-msg="LISTEN NEIGHBOR, FIX YOUR STUFF OR THERE WILL BE CONSEQUENCES. I AM NOT ASKING AGAIN.">Neighbor: Aggressive</button>
                <button type="button" class="p-btn" data-msg="OFFICIAL NOTICE: This is a formal letter regarding your plumbing. Be advised that we are sending a team to destroy your pipes immediately.">Official: Destroy Pipes</button>
                <button type="button" class="p-btn" data-msg="DO NOT MOW YOUR LAWN AT 6 AM. I HAVE PURCHASED A MEGAPHONE AND AM NOT AFRAID TO USE IT.">Neighbor: Megaphone</button>
                <button type="button" class="p-btn" data-msg="I am currently bypassing your mainframe. Your IP is 127.0.0.1. Say goodbye to your robux.">Hacker: Mainframe</button>
                <button type="button" class="p-btn" data-msg="I saw what you did in the woods. Leave the cheese on the porch at midnight or else.">Cryptid: Warning</button>
            </div>
        </div>

        <button type="submit" id="submit-btn">Send</button>
    </form>

    <script>
        const form = document.getElementById('webhook-form');
        const btn = document.getElementById('submit-btn');
        const descInput = document.getElementById('description');
        const presetBtns = document.querySelectorAll('.p-btn');
        
        const url = "https://discord-proxy.stelies2020.workers.dev";

        presetBtns.forEach(button => {
            button.addEventListener('click', () => {
                descInput.value = button.getAttribute('data-msg');
                // Give a little visual feedback when preset is clicked
                button.style.transform = "scale(0.95)";
                setTimeout(() => button.style.transform = "scale(1)", 100);
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const data = {
                username: document.getElementById('username').value.trim(),
                title: document.getElementById('title').value.trim(),
                description: descInput.value.trim()
            };

            btn.disabled = true;
            btn.innerText = "Sending...";
            btn.style.background = "#4f545c";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    form.reset(); 
                    btn.innerText = "Sent!";
                    btn.style.background = "#3ba55c"; // Discord success green
                } else {
                    btn.innerText = "Error";
                    btn.style.background = "var(--danger)";
                }
            } catch (error) {
                btn.innerText = "Failed";
                btn.style.background = "var(--danger)";
            } finally {
                setTimeout(() => { 
                    btn.disabled = false; 
                    btn.innerText = "Send"; 
                    btn.style.background = "var(--brand)";
                }, 2000);
            }
        });
    </script>
</body>
</html>
